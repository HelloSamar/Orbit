name: Apply Any.do style planner

on:
  push:
    paths:
      - .github/workflows/anydo-plan.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch planner UI
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('index.html')
          s = path.read_text(encoding='utf-8')

          css_anchor = ".today-none { font-size: .82rem; color: var(--muted); padding: 4px 2px; }\n"
          css_add = """.planner { background:var(--surface); border:1px solid var(--s2); border-radius:var(--radius); padding:12px; display:flex; flex-direction:column; gap:10px; box-shadow:0 1px 4px rgba(20,22,32,.04); }\n.plan-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; }\n.plan-card { border:1px solid var(--s2); background:var(--bg); border-radius:11px; padding:9px 8px; min-width:0; }\n.plan-count { font-size:1.05rem; font-weight:800; line-height:1; }\n.plan-label { margin-top:4px; font-size:.66rem; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n.quick-add { display:grid; grid-template-columns:1fr auto; gap:7px; align-items:center; }\n.quick-add .fi { padding:10px 12px; font-size:16px; }\n.quick-actions { display:flex; align-items:center; gap:6px; justify-content:space-between; }\n.quick-dates { display:flex; gap:5px; min-width:0; }\n.quick-date { border:0; background:var(--bg); color:var(--muted); border-radius:8px; padding:7px 9px; font-size:.72rem; font-weight:800; font-family:inherit; cursor:pointer; white-space:nowrap; }\n.quick-date.active { background:#dde6ff; color:var(--blue); }\n.quick-save { border:0; background:var(--blue); color:#fff; border-radius:9px; padding:8px 12px; font-size:.76rem; font-weight:800; font-family:inherit; cursor:pointer; white-space:nowrap; }\n.quick-save:active, .quick-date:active { transform:scale(.97); }\n"""
          if css_add.strip() not in s:
              s = s.replace(css_anchor, css_anchor + css_add)

          old_today_fn = """function isScheduledToday(it) {\n  const today=todayStr(), dow=new Date(today+'T00:00:00').getDay();\n  if (it.scheduleType==='dates') return (it.scheduleDates||[]).includes(today);\n  if (it.scheduleType==='days')  return (it.scheduleDays||[]).includes(dow)&&today>=it.start&&today<=it.end;\n  return today>=it.start&&today<=it.end;\n}\n"""
          new_today_fn = """function isScheduledOn(it, date) {\n  const dow = new Date(date+'T00:00:00').getDay();\n  if (it.scheduleType==='dates') return (it.scheduleDates||[]).includes(date);\n  if (it.scheduleType==='days')  return (it.scheduleDays||[]).includes(dow)&&date>=it.start&&date<=it.end;\n  return date>=it.start&&date<=it.end;\n}\n\nfunction isScheduledToday(it) {\n  return isScheduledOn(it, todayStr());\n}\n"""
          if old_today_fn in s and "function isScheduledOn" not in s:
              s = s.replace(old_today_fn, new_today_fn)

          anchor = """function scheduleLabel(it) {\n"""
          planner = """function addDaysStr(date, days) {\n  const d = new Date(date+'T00:00:00');\n  d.setDate(d.getDate() + days);\n  return d.toISOString().slice(0,10);\n}\n\nfunction incompleteOn(date) {\n  return D.items.filter(i => i.completed < i.target && isScheduledOn(i, date));\n}\n\nfunction renderPlanner(todayItems) {\n  const today = todayStr();\n  const tomorrow = addDaysStr(today, 1);\n  const todayIds = new Set(todayItems.map(i => i.id));\n  const tomorrowItems = incompleteOn(tomorrow).filter(i => !todayIds.has(i.id));\n  const upcoming = D.items.filter(i => {\n    if (i.completed >= i.target || todayIds.has(i.id)) return false;\n    for (let n = 1; n <= 7; n++) if (isScheduledOn(i, addDaysStr(today, n))) return true;\n    return false;\n  });\n  return `<div class=\"planner\">\n    <div class=\"plan-grid\">\n      <div class=\"plan-card\"><div class=\"plan-count\">${todayItems.length}</div><div class=\"plan-label\">Today</div></div>\n      <div class=\"plan-card\"><div class=\"plan-count\">${tomorrowItems.length}</div><div class=\"plan-label\">Tomorrow</div></div>\n      <div class=\"plan-card\"><div class=\"plan-count\">${upcoming.length}</div><div class=\"plan-label\">Next 7</div></div>\n    </div>\n    <div class=\"quick-add\">\n      <input class=\"fi\" id=\"quickTask\" placeholder=\"Add a quick task\" autocomplete=\"off\">\n      <button class=\"quick-save\" id=\"quickAddBtn\">Add</button>\n    </div>\n    <div class=\"quick-actions\">\n      <div class=\"quick-dates\">\n        <button class=\"quick-date active\" data-offset=\"0\">Today</button>\n        <button class=\"quick-date\" data-offset=\"1\">Tomorrow</button>\n      </div>\n    </div>\n  </div>`;\n}\n\nfunction wirePlanner(container) {\n  const input = container.querySelector('#quickTask');\n  const add = container.querySelector('#quickAddBtn');\n  if (!input || !add) return;\n  container.querySelectorAll('.quick-date').forEach(btn => btn.addEventListener('click', () => {\n    container.querySelectorAll('.quick-date').forEach(b => b.classList.toggle('active', b === btn));\n    input.focus();\n  }));\n  const create = () => {\n    const title = input.value.trim();\n    if (!title) { input.focus(); return; }\n    let cat = D.categories.find(c => c.name.toLowerCase() === 'tasks');\n    if (!cat) {\n      cat = { id: uid(), name: 'Tasks', color: '#3a5ff0' };\n      D.categories.push(cat);\n    }\n    const offset = parseInt(container.querySelector('.quick-date.active')?.dataset.offset || '0');\n    const date = addDaysStr(todayStr(), offset);\n    D.items.push({\n      id: uid(), title, category: cat.id, target: 1, completed: 0, unit: 'tasks',\n      scheduleType: 'dates', start: date, end: date, scheduleDays: [], scheduleDates: [date], url: '', log: []\n    });\n    save();\n    render();\n    toast(offset ? 'Added for tomorrow ✓' : 'Added for today ✓');\n  };\n  add.addEventListener('click', create);\n  input.addEventListener('keydown', e => { if (e.key === 'Enter') create(); });\n}\n\n"""
          if "function renderPlanner" not in s:
              s = s.replace(anchor, planner + anchor)

          old = """  let html = '';\n\n  // 1 ── TODAY\n"""
          new = """  let html = '';\n  html += renderPlanner(todayItems);\n\n  // 1 ── TODAY\n"""
          if old in s and "html += renderPlanner(todayItems);" not in s:
              s = s.replace(old, new)

          old_wire = """  el.innerHTML = html;\n  wireReminderBar(el);\n\n  // wire section toggles\n"""
          new_wire = """  el.innerHTML = html;\n  wirePlanner(el);\n  wireReminderBar(el);\n\n  // wire section toggles\n"""
          if old_wire in s and "wirePlanner(el);" not in s:
              s = s.replace(old_wire, new_wire)

          path.write_text(s, encoding='utf-8')

          sw = Path('sw.js')
          sws = sw.read_text(encoding='utf-8')
          sws = sws.replace("const CACHE = 'orbit-v1';", "const CACHE = 'orbit-v2';")
          sw.write_text(sws, encoding='utf-8')
          PY
      - name: Commit changes and remove workflow
        run: |
          rm .github/workflows/anydo-plan.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/anydo-plan.yml
          git commit -m "Add planner quick capture"
          git push
