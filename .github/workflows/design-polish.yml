name: Apply design polish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  design-polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - name: Patch Orbit UI polish
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          def replace_once(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Missing expected block: {label}')
              text = text.replace(old, new, 1)

          replace_once(
              ".list { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; }",
              ".app-head { width:100%; max-width:420px; display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:14px; }\n.brand { display:flex; align-items:center; gap:10px; min-width:0; }\n.brand-mark { width:38px; height:38px; border-radius:12px; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(58,95,240,.22); }\n.brand-mark svg { width:20px; height:20px; }\n.brand-copy { min-width:0; }\n.brand-title { font-size:1.18rem; font-weight:800; letter-spacing:.01em; }\n.brand-sub { font-size:.76rem; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n.status-pill { border:1px solid var(--s2); background:var(--surface); color:var(--muted); border-radius:999px; padding:7px 10px; font-size:.68rem; font-weight:800; display:flex; align-items:center; gap:6px; box-shadow:0 1px 4px rgba(20,22,32,.04); white-space:nowrap; }\n.status-pill::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--s2); }\n.status-pill.on::before { background:var(--green); }\n.list { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; }",
              'list css'
          )

          replace_once(
              ".empty-state { text-align: center; padding: 48px 0; display: flex; flex-direction: column; align-items: center; gap: 12px; }",
              ".empty-state { text-align: center; padding: 34px 0 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }",
              'empty spacing'
          )

          replace_once(
              ".empty-cta { margin-top: 4px; padding: 9px 22px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit; }",
              ".empty-cta { margin-top: 4px; padding: 9px 22px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit; }\n.empty-suggestions { width:100%; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; margin-top:4px; }\n.empty-suggestion { border:1px solid color-mix(in srgb, var(--sc) 45%, var(--s2)); background:var(--surface); color:var(--text); border-radius:11px; padding:10px 12px; font-size:.8rem; font-weight:800; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }\n.empty-suggestion::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--sc); flex-shrink:0; }\n.empty-suggestion:active { transform:scale(.98); background:var(--s2); }",
              'empty suggestions css'
          )

          replace_once(
              "  position:fixed;\n  right:max(20px, var(--sar));\n  bottom:max(76px, calc(var(--sab) + 70px));\n  width:9px;height:9px;border-radius:50%;",
              "  position:fixed;\n  right:max(40px, var(--sar));\n  bottom:calc(max(24px, var(--sab)) + 110px);\n  width:9px;height:9px;border-radius:50%;",
              'sync dot position'
          )

          replace_once(
              "<div class=\"list\" id=\"list\"></div>",
              "<header class=\"app-head\">\n  <div class=\"brand\">\n    <div class=\"brand-mark\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><path d=\"M4 12c2.5-5 13.5-5 16 0\"/><path d=\"M4 12c2.5 5 13.5 5 16 0\"/></svg>\n    </div>\n    <div class=\"brand-copy\">\n      <div class=\"brand-title\">Orbit</div>\n      <div class=\"brand-sub\" id=\"headSub\">Track today</div>\n    </div>\n  </div>\n  <div class=\"status-pill\" id=\"headStatus\">Local</div>\n</header>\n<div class=\"list\" id=\"list\"></div>",
              'header markup'
          )

          replace_once(
              "function render() {\n  const el = document.getElementById('list');",
              "function renderHeader() {\n  const sub = document.getElementById('headSub');\n  const status = document.getElementById('headStatus');\n  const today = new Date(todayStr()+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});\n  const due = D.items.filter(i=>isScheduledToday(i)&&i.completed<i.target).length;\n  if (sub) sub.textContent = due ? `${due} due today · ${today}` : `Clear today · ${today}`;\n  if (status) {\n    const on = !!(gistCfg.token && gistCfg.gistId);\n    status.textContent = on ? 'Sync on' : 'Local';\n    status.classList.toggle('on', on);\n  }\n}\n\nfunction render() {\n  renderHeader();\n  const el = document.getElementById('list');",
              'render header function'
          )

          replace_once(
              "        <div class=\"empty-title\">Nothing tracked yet</div>\n        <div class=\"empty-sub\">${D.categories.length ? 'Add your first item to get started.' : 'Start by adding a category, then create your first item.'}</div>\n        <button class=\"empty-cta\" id=\"emptyCta\">${D.categories.length ? '+ Add Item' : '+ Add Category'}</button>\n      </div>` + renderReminderBar();",
              "        <div class=\"empty-title\">Nothing tracked yet</div>\n        <div class=\"empty-sub\">${D.categories.length ? 'Add your first item to get started.' : 'Pick a starting area and Orbit will set it up.'}</div>\n        ${!D.categories.length ? `<div class=\"empty-suggestions\">${SUGGESTED_CATS.slice(0,4).map(c=>`<button class=\"empty-suggestion\" data-name=\"${esc(c.name)}\" data-color=\"${c.color}\" style=\"--sc:${c.color}\">${esc(c.name)}</button>`).join('')}</div>` : ''}\n        <button class=\"empty-cta\" id=\"emptyCta\">${D.categories.length ? '+ Add Item' : '+ Custom Category'}</button>\n      </div>` + renderReminderBar();",
              'empty state markup'
          )

          replace_once(
              "    document.getElementById('emptyCta').addEventListener('click', () => {\n      if (!D.categories.length) {",
              "    el.querySelectorAll('.empty-suggestion').forEach(b => b.addEventListener('click', () => {\n      D.categories.push({ id: uid(), name: b.dataset.name, color: b.dataset.color });\n      save();\n      panelTab = 'items';\n      document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'items'));\n      openPanel();\n    }));\n    document.getElementById('emptyCta').addEventListener('click', () => {\n      if (!D.categories.length) {",
              'empty suggestion handlers'
          )

          replace_once(
              "  el.style.background = s.bg;\n  el.title = s.title;\n}",
              "  el.style.background = s.bg;\n  el.title = s.title;\n  if (typeof renderHeader === 'function') renderHeader();\n}",
              'sync header update'
          )

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit design polish and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/design-polish.yml
          if git diff --cached --quiet && git diff --quiet -- index.html; then
            echo "No design polish changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Polish Orbit mobile UI"
          git push
