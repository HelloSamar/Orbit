name: Fix overdue status logic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-overdue-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - name: Patch status date boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_dates = """  if (it.scheduleType === 'dates') {\n    const passed = (it.scheduleDates||[]).filter(d=>d<=today).length;\n    const total  = (it.scheduleDates||[]).length;\n    if (!total) return 'on';\n    if (passed===total) return 'overdue';\n    return it.completed >= it.target*(passed/total)*0.9 ? 'on' : 'behind';\n  }"""
          new_dates = """  if (it.scheduleType === 'dates') {\n    const dates = it.scheduleDates || [];\n    const passed = dates.filter(d=>d<=today).length;\n    const total  = dates.length;\n    if (!total) return 'on';\n    if (dates[total - 1] < today) return 'overdue';\n    return it.completed >= it.target*(passed/total)*0.9 ? 'on' : 'behind';\n  }"""

          old_days = """    if (!total) return 'on';\n    if (passed===total) return 'overdue';\n    return it.completed >= it.target*(passed/total)*0.9 ? 'on' : 'behind';"""
          new_days = """    if (!total) return 'on';\n    let lastScheduled = '';\n    for (let d=new Date(end), iter=0; d>=start && iter<366; d.setDate(d.getDate()-1), iter++) {\n      if (days.includes(d.getDay())) { lastScheduled = d.toISOString().slice(0,10); break; }\n    }\n    if (lastScheduled && lastScheduled < today) return 'overdue';\n    return it.completed >= it.target*(passed/total)*0.9 ? 'on' : 'behind';"""

          replacements = [
              (old_dates, new_dates, 'specific-date overdue boundary'),
              (old_days, new_days, 'weekday overdue boundary'),
              ("  if (today>=it.end) return 'overdue';", "  if (today>it.end) return 'overdue';", 'range overdue boundary'),
          ]

          for old, new, label in replacements:
              if old not in text:
                  raise SystemExit(f'Missing expected block: {label}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix and remove temporary workflow
        shell: bash
        run: |
          git rm .github/workflows/fix-overdue-status.yml
          if git diff --cached --quiet && git diff --quiet -- index.html; then
            echo "No overdue status changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix overdue status date boundaries"
          git push
