function renderSchedFields(it) {
  const sf = document.getElementById('sched-fields'); if (!sf) return;
  const dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
  if (formType==='range') {
    sf.innerHTML=`<div class="frow">
      <div class="fg"><label class="fl">Start</label><input class="fi" type="date" id="f_s" value="${it&&it.scheduleType==='range'?it.start:(it?it.start:'')}"></div>
      <div class="fg"><label class="fl">End</label><input class="fi" type="date" id="f_e" value="${it&&it.scheduleType==='range'?it.end:(it?it.end:'')}"></div>
    </div>`;
  } else if (formType==='days') {
    sf.innerHTML=`<div class="frow">
      <div class="fg"><label class="fl">From</label><input class="fi" type="date" id="f_s" value="${it?it.start:''}"></div>
      <div class="fg"><label class="fl">Until</label><input class="fi" type="date" id="f_e" value="${it?it.end:''}"></div>
    </div>
    <div class="fg"><label class="fl">Repeat on</label>
      <div class="day-picker">${dayNames.map((n,i)=>`<button class="dp-btn ${formDays.includes(i)?'sel':''}" data-day="${i}">${n}</button>`).join('')}</div>
    </div>`;
    sf.querySelectorAll('.dp-btn').forEach(b=>b.addEventListener('click',()=>{
      const d=parseInt(b.dataset.day);
      formDays=formDays.includes(d)?formDays.filter(x=>x!==d):[...formDays,d];
      b.classList.toggle('sel',formDays.includes(d));
    }));
  } else {
    sf.innerHTML=`<div class="fg"><label class="fl">Specific Dates</label>
      <div class="date-chips" id="date-chips">${formDates.map(d=>`<span class="date-chip">${fmtDate(d)}<button data-d="${d}">×</button></span>`).join('')}</div>
      <div class="date-add-row" style="margin-top:6px">
        <input class="fi" type="date" id="date-pick">
        <button class="btn-s" id="date-add-btn">Add</button>
      </div>
    </div>`;
    sf.querySelector('#date-add-btn').addEventListener('click',()=>{
      const v=document.getElementById('date-pick').value;
      if (!v||formDates.includes(v)) return;
      formDates=[...formDates,v].sort(); renderSchedFields(it);
    });
    sf.querySelectorAll('.date-chip button').forEach(b=>b.addEventListener('click',()=>{ formDates=formDates.filter(x=>x!==b.dataset.d); renderSchedFields(it); }));
  }
}

function saveItem() {
  const t=document.getElementById('f_t').value.trim();
  const c=document.getElementById('f_c').value;
  const tg=parseInt(document.getElementById('f_tg').value);
  let u = document.getElementById('f_u').value;
  if (u === '__custom__') {
    u = document.getElementById('f_custom_unit')?.value.trim().toLowerCase();
    if (!u) { toast('Enter a unit name','err'); return; }
  }
  const url=document.getElementById('f_url').value.trim();
  const fs=document.getElementById('f_s')?.value||'';
  const fe=document.getElementById('f_e')?.value||'';
  if (!t||!c||!tg) { toast('Fill all fields','err'); return; }
  if (formType==='range'&&(!fs||!fe)) { toast('Set start & end dates','err'); return; }
  if (formType==='days'&&(!fs||!fe))  { toast('Set from & until dates','err'); return; }
  if (formType==='days'&&!formDays.length) { toast('Pick at least one weekday','err'); return; }
  if (formType==='dates'&&!formDates.length) { toast('Add at least one date','err'); return; }
  const base = {
    title:t, category:c, target:tg, unit:u, scheduleType:formType,
    start:fs||(formDates[0]||''), end:fe||(formDates[formDates.length-1]||''),
    scheduleDays:formType==='days'?[...formDays]:[],
    scheduleDates:formType==='dates'?[...formDates]:[],
    url,
  };
  if (editItem) {
    const old=D.items.find(i=>i.id===editItem);
    if (old) Object.assign(old,base);
    editItem=null; toast('Saved ✓');
  } else {
    D.items.push({id:uid(),completed:0,log:[],...base});
    toast('Added ✓');
  }
  save(); render(); renderPanel();
}

function renderList() {
  const pb=document.getElementById('pbody');
  if (!D.items.length) { pb.innerHTML='<p style="font-size:.86rem;color:var(--muted)">No items yet.</p>'; return; }
  const order={overdue:0,behind:1,on:2,done:3};
  const sorted=[...D.items].sort((a,b)=>order[status(a)]-order[status(b)]);
  pb.innerHTML=`
    <div class="sdiv">All Items (${D.items.length})</div>
    ${sorted.map(i=>{
      const c=getCat(i.category), pct=Math.min(100,Math.round(i.completed/Math.max(1,i.target)*100)), st=status(i);
      return `<div style="display:flex;flex-direction:column;gap:7px">
        <div class="lrow">
          <div class="linfo">
            <span class="swatch" style="background:${c.color}"></span>
            <div><div class="lname">${esc(i.title)}</div><div class="lsub">${scheduleLabel(i)} · ${esc(c.name)}</div></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
            <div class="pctrl">
              <button class="cbtn" data-id="${i.id}" data-dir="-">−</button>
              <input class="cinp" type="number" inputmode="numeric" value="${i.completed}" min="0" max="${i.target}" data-id="${i.id}">
              <button class="cbtn" data-id="${i.id}" data-dir="+">+</button>
            </div>
            <div style="display:flex;gap:4px;align-items:center">
              <span style="font-size:.78rem;font-weight:700;color:${pctColor(st)}">${pct}%</span>
              <button class="btn-s ei-btn" data-id="${i.id}">Edit</button>
              <button class="btn-d di-btn" data-id="${i.id}">Del</button>
            </div>
          </div>
        </div>
        <div id="log-${i.id}"></div>
      </div>`;
    }).join('')}
  `;
  sorted.forEach(i => renderLog(i.id));
  pb.querySelectorAll('.cbtn').forEach(b=>b.addEventListener('click',()=>{
    const i=D.items.find(x=>x.id===b.dataset.id); if(!i) return;
    i.completed=Math.max(0,Math.min(i.target,i.completed+(b.dataset.dir==='+'?1:-1)));
    save(); render(); renderList();
  }));
  pb.querySelectorAll('.cinp').forEach(inp=>inp.addEventListener('change',()=>{
    const i=D.items.find(x=>x.id===inp.dataset.id); if(!i) return;
    i.completed=Math.max(0,Math.min(i.target,parseInt(inp.value)||0));
    inp.value=i.completed; save(); render(); renderList();
  }));
  pb.querySelectorAll('.ei-btn').forEach(b=>b.addEventListener('click',()=>{
    editItem=b.dataset.id; panelTab='items';
    document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.tab==='items'));
    renderPanel();
  }));
  pb.querySelectorAll('.di-btn').forEach(b=>b.addEventListener('click',()=>{
    const it=D.items.find(i=>i.id===b.dataset.id); if(!it) return;
    softDelete(it);
  }));
}

function renderLog(id) {
  const el = document.getElementById('log-'+id); if (!el) return;
  const it = D.items.find(i=>i.id===id); if (!it) return;
  if (!it.log) it.log = [];
  const log = it.log;
  el.innerHTML = `<div class="log-section">
    <div class="log-title">Session Log</div>
    <div class="log-add">
      <input class="cinp" type="number" inputmode="numeric" id="log-amt-${id}" min="1" placeholder="amt" style="width:64px">
      <input class="fi" type="date" id="log-date-${id}" value="${todayStr()}" style="font-size:16px;padding:8px 10px">
      <input class="fi" id="log-note-${id}" placeholder="note" style="font-size:16px;padding:8px 10px">
      <button class="btn-s" id="log-add-${id}">+ Log</button>
    </div>
    ${log.length ? `<div class="log-entries">
      ${[...log].reverse().map((e,ri) => {
        const realIdx = log.length-1-ri;
        return `<div class="log-entry">
          <div class="log-entry-left">
            <span style="font-weight:700">+${e.amt} ${esc(it.unit)}</span>
            <span class="log-entry-date">${fmtDate(e.date)}</span>
            ${e.note ? `<span class="log-entry-note">${esc(e.note)}</span>` : ''}
          </div>
          <button class="log-entry-del" data-id="${id}" data-idx="${realIdx}">×</button>
        </div>`;
      }).join('')}
    </div>` : '<div style="font-size:.74rem;color:var(--muted)">No sessions logged yet.</div>'}
  </div>`;
  el.querySelector('#log-add-'+id).addEventListener('click', () => {
    const amt  = parseInt(el.querySelector('#log-amt-'+id).value);
    const dt   = el.querySelector('#log-date-'+id).value;
    const note = el.querySelector('#log-note-'+id).value.trim();
    if (!amt || amt < 1 || !dt) { toast('Enter amount & date','err'); return; }
    it.log.push({amt, date:dt, note});
    it.completed = Math.min(it.target, it.completed + amt);
    save(); render(); renderList();
  });
  el.querySelectorAll('.log-entry-del').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.idx);
    it.completed = Math.max(0, it.completed - it.log[idx].amt);
    it.log.splice(idx, 1);
    save(); render(); renderList();
  }));
}

function softDelete(it) {
  D.items=D.items.filter(i=>i.id!==it.id);
  save(); render(); if(panelTab==='list') renderList();
  showUndo(`"${it.title}" deleted`,it);
}
function showUndo(msg,payload) {
  undoPending=payload; clearTimeout(undoTimer);
  const ut=document.getElementById('undoToast');
  document.getElementById('undoMsg').textContent=msg;
  ut.classList.add('show');
  undoTimer=setTimeout(()=>{ undoPending=null; ut.classList.remove('show'); },4000);
}
document.getElementById('undoBtn').onclick=()=>{
  if (!undoPending) return;
  if (undoPending._type==='cat') { const {_type,...cat}=undoPending; D.categories.push(cat); if(panelTab==='cats') renderCats(); }
  else { D.items.push(undoPending); if(panelTab==='list') renderList(); }
  undoPending=null; clearTimeout(undoTimer);
  document.getElementById('undoToast').classList.remove('show');
  save(); render(); toast('Restored ✓');
};

function renderCats() {
  const pb=document.getElementById('pbody');
  const cat=editCat?D.categories.find(c=>c.id===editCat):null;
  pb.innerHTML=`
    <div class="sdiv">${cat?'Edit Category':'Add Category'}</div>
    <div class="fg"><label class="fl">Name</label><input class="fi" id="c_n" value="${cat?esc(cat.name):''}" placeholder="e.g. Science"></div>
    <div class="fg"><label class="fl">Color</label><input class="fi" type="color" id="c_c" value="${cat?cat.color:'#3a5ff0'}" style="height:44px;padding:4px 8px;cursor:pointer"></div>
    <button class="btn-p" id="saveCatBtn">${cat?'Save':'Add'}</button>
    ${cat?`<button class="btn-s" id="cancelCat" style="width:100%;margin-top:6px">Cancel</button>`:''}
    <div class="sdiv" style="margin-top:4px">Categories</div>
    ${D.categories.map(c=>`<div class="lrow">
      <div class="linfo"><span class="swatch" style="background:${c.color}"></span><span class="lname">${esc(c.name)}</span></div>
      <div style="display:flex;gap:5px">
        <button class="btn-s ec-btn" data-id="${c.id}">Edit</button>
        <button class="btn-d dc-btn" data-id="${c.id}">Del</button>
      </div>
    </div>`).join('')}
  `;
  pb.querySelector('#saveCatBtn').addEventListener('click',()=>{
    const n=document.getElementById('c_n').value.trim(), cl=document.getElementById('c_c').value;
    if (!n) { toast('Enter name','err'); return; }
    if (editCat) { const cat=D.categories.find(c=>c.id===editCat); if(cat){cat.name=n;cat.color=cl;} editCat=null; toast('Saved ✓'); }
    else { D.categories.push({id:uid(),name:n,color:cl}); toast('Added ✓'); }
    save(); render(); renderCats();
  });
  pb.querySelector('#cancelCat')?.addEventListener('click',()=>{editCat=null;renderCats();});
  pb.querySelectorAll('.ec-btn').forEach(b=>b.addEventListener('click',()=>{editCat=b.dataset.id;renderCats();}));
  pb.querySelectorAll('.dc-btn').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.id;
    if (D.items.some(i=>i.category===id)) { toast('Category in use — reassign items first','err'); return; }
    const cat=D.categories.find(c=>c.id===id); if(!cat) return;
    D.categories=D.categories.filter(c=>c.id!==id);
    save(); render(); renderCats();
    showUndo(`Category "${cat.name}" deleted`,{_type:'cat',...cat});
  }));
}

function renderData() {
  const pb = document.getElementById('pbody');
  const connected = !!(gistCfg.token && gistCfg.gistId);

  pb.innerHTML = `
    <div class="sdiv">Reminders</div>
    ${renderReminderBar()}

    <div class="sdiv" style="margin-top:10px">Gist Sync</div>
    <div class="gist-setup" id="gistSetup"></div>

    <div class="sdiv" style="margin-top:10px">Local Backup</div>
    <button class="btn-p" id="expBtn">⬇ Download Backup</button>
    <div style="margin-top:4px"></div>
    <p style="font-size:.78rem;color:var(--muted);line-height:1.5">Replaces all current data with a backup file.</p>
    <label class="btn-p" style="display:block;text-align:center;cursor:pointer;line-height:3;margin-top:2px">
      ⬆ Choose JSON…<input type="file" accept=".json" id="impFile" class="file-in">
    </label>
    <div id="import-confirm" style="display:none"></div>
    <div class="sdiv" style="margin-top:8px">About</div>
    <p style="font-size:.74rem;color:var(--muted);line-height:1.6">Orbit · Data stored locally · Works offline</p>
  `;

  renderGistSetup(pb.querySelector('#gistSetup'));
  wireReminderBar(pb);

  pb.querySelector('#expBtn').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:'application/json'}));
    a.download = `orbit_${todayStr()}.json`; a.click(); toast('Exported ✓');
  });
  pb.querySelector('#impFile').addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    try {
      const parsed = JSON.parse(await f.text());
      const conf = document.getElementById('import-confirm');
      conf.style.display = 'block';
      conf.innerHTML = `<div class="import-confirm">
        <span>Replace all data with "${esc(f.name)}"?</span>
        <div class="import-confirm-btns">
          <button class="btn-d" id="imp-yes" style="flex:1">Replace</button>
          <button class="btn-s" id="imp-no" style="flex:1">Cancel</button>
        </div>
      </div>`;
      conf.querySelector('#imp-yes').onclick = () => { D=parsed; save(); render(); renderData(); toast('Imported ✓'); };
      conf.querySelector('#imp-no').onclick  = () => { conf.style.display='none'; e.target.value=''; };
    } catch { toast('Invalid file','err'); }
  });
}

function renderGistSetup(container) {
  const connected = !!(gistCfg.token && gistCfg.gistId);

  if (!connected) {
    const prefilledId = gistCfg.gistId || DEFAULT_GIST_ID || '';
    container.innerHTML = `
      <div class="gist-status inf">
        Paste your GitHub token to enable auto-sync. Changes will save to Gist automatically.
      </div>
      <div class="fg">
        <label class="fl">GitHub Token</label>
        <input class="fi" id="g_tok" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">Gist ID ${prefilledId ? '(pre-filled)' : '(leave blank to create new)'}</label>
        <input class="fi" id="g_gid" value="${prefilledId}" placeholder="e.g. 4a3b2c1d…" autocomplete="off" ${prefilledId ? 'style="color:var(--blue)"' : ''}>
      </div>
      <p style="font-size:.7rem;color:var(--muted);line-height:1.6">
        GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token → tick <strong>gist</strong> scope only → copy above.
      </p>
      <button class="gist-btn-push" id="gistConnectBtn" style="width:100%">Connect</button>
      <div id="gistMsg"></div>
    `;
    container.querySelector('#gistConnectBtn').addEventListener('click', gistConnect);
  } else {
    const last = gistCfg.lastSync ? `Last synced: ${new Date(gistCfg.lastSync).toLocaleString()}` : 'Never synced';
    container.innerHTML = `
      <div class="gist-status ok">✓ Auto-sync on · Gist ID: <code style="font-size:.65rem;word-break:break-all">${gistCfg.gistId}</code></div>
      <p style="font-size:.72rem;color:var(--muted);line-height:1.5">Changes save automatically to Gist within 3 seconds. Pull once on a new device to get the latest data.</p>
      <button class="gist-btn-pull" id="gistPullBtn" style="width:100%">⬇ Pull from Gist</button>
      <div class="gist-last-sync" id="gistLastSync">${last}</div>
      <div style="text-align:center;margin-top:4px">
        <button class="gist-btn-disconnect" id="gistDisconnect">Disconnect</button>
      </div>
      <div id="gistMsg"></div>
    `;
    container.querySelector('#gistPullBtn').addEventListener('click', () => gistPull());
    container.querySelector('#gistDisconnect').addEventListener('click', () => {
      gistCfg = {}; saveGistCfg();
      setSyncIndicator('off');
      renderData();
    });
  }
}

function gistMsg(container, text, type='inf') {
  const el = container.querySelector('#gistMsg');
  if (el) { el.className = `gist-status ${type}`; el.style.marginTop='4px'; el.textContent = text; }
}

async function gistConnect() {
  const pb    = document.getElementById('pbody');
  const token = document.getElementById('g_tok')?.value.trim();
  const existingId = document.getElementById('g_gid')?.value.trim();
  if (!token) { gistMsg(pb.querySelector('#gistSetup'), 'Paste your token first.', 'err'); return; }
  const btn = pb.querySelector('#gistConnectBtn');
  btn.textContent = 'Connecting…'; btn.disabled = true;
  try {
    if (existingId) {
      // verify the gist exists and is accessible
      const res = await fetch(`https://api.github.com/gists/${existingId}`, {
        headers: { Authorization: `token ${token}` }
      });
      if (!res.ok) throw new Error(`Gist not found or not accessible (${res.status})`);
      gistCfg = { token, gistId: existingId, lastSync: null };
      saveGistCfg();
      toast('Connected to existing Gist ✓');
      renderData();
    } else {
      // create a new private gist
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          description: 'Orbit data',
          public: false,
          files: { 'orbit.json': { content: JSON.stringify(D, null, 2) } }
        })
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status} — check token has gist scope`);
      const data = await res.json();
      gistCfg = { token, gistId: data.id, lastSync: Date.now() };
      saveGistCfg();
      toast('Gist created ✓');
      renderData();
    }
  } catch(e) {
    btn.textContent = 'Connect'; btn.disabled = false;
    gistMsg(pb.querySelector('#gistSetup'), `Error: ${e.message}`, 'err');
  }
}

async function gistPush(silent=false) {
  const pb  = document.getElementById('pbody');
  setSyncIndicator('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${gistCfg.gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${gistCfg.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        files: { 'orbit.json': { content: JSON.stringify(D, null, 2) } }
      })
    });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    gistCfg.lastSync = Date.now(); saveGistCfg();
    autoSyncFailCount = 0;
    setSyncIndicator('ok');
    if (!silent) {
      const el = pb?.querySelector('#gistLastSync');
      if (el) el.textContent = `Last synced: ${new Date(gistCfg.lastSync).toLocaleString()}`;
      gistMsg(pb?.querySelector('#gistSetup'), 'Pushed ✓', 'ok');
      toast('Pushed ✓');
    }
  } catch(e) {
    setSyncIndicator('err');
    if (silent) {
      autoSyncFailCount++;
      if (autoSyncFailCount >= 3) {
        autoSyncFailCount = 0;
        toast('Auto-sync failed — check connection', 'err');
      }
    } else {
      gistMsg(pb?.querySelector('#gistSetup'), `Push failed: ${e.message}`, 'err');
    }
  }
}

async function gistPull(silent=false) {
  const pb  = document.getElementById('pbody');
  const btn = pb?.querySelector('#gistPullBtn');
  if (btn) { btn.textContent = 'Pulling…'; btn.disabled = true; }
  setSyncIndicator('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${gistCfg.gistId}`, {
      headers: { Authorization: `token ${gistCfg.token}` }
    });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const data   = await res.json();
    const raw    = data.files['orbit.json']?.content;
    if (!raw) throw new Error('orbit.json not found in Gist');
    const parsed = JSON.parse(raw);
    D = parsed;
    localStorage.setItem(STORE_KEY, JSON.stringify(D));
    gistCfg.lastSync = Date.now(); saveGistCfg();
    setSyncIndicator('ok');
    render();
    if (btn) { btn.textContent = '⬇ Pull from Gist'; btn.disabled = false; }
    const el = pb?.querySelector('#gistLastSync');
    if (el) el.textContent = `Last synced: ${new Date(gistCfg.lastSync).toLocaleString()}`;
    gistMsg(pb?.querySelector('#gistSetup'), 'Pulled from Gist ✓', 'ok');
    toast('Pulled ✓');
  } catch(e) {
    setSyncIndicator('err');
    if (btn) { btn.textContent = '⬇ Pull from Gist'; btn.disabled = false; }
    gistMsg(pb?.querySelector('#gistSetup'), `Pull failed: ${e.message}`, 'err');
  }
}

let tt;
function toast(msg,type='ok') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2200);
}

initReminders();
render();
setSyncIndicator(gistCfg.token && gistCfg.gistId ? 'ok' : 'off');

/* ── AUTO-PULL on startup: only if no local data or never synced ── */
(async () => {
  const hasLocal = !!localStorage.getItem(STORE_KEY);
  if (gistCfg.token && gistCfg.gistId && (!hasLocal || !gistCfg.lastSync)) {
    setSyncIndicator('syncing');
    toast('Loading from Gist…', 'ok');
    await gistPull(true);
  }
})();
</script>
